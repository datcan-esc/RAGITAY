services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragitay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragitay}
      POSTGRES_USER: ${POSTGRES_USER:-ragitay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragitay}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ragitay-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ragitay}
      POSTGRES_USER: ${POSTGRES_USER:-ragitay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragitay}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-intfloat/multilingual-e5-base}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-}
      EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-false}
      SUMMARY_PROVIDER: ${SUMMARY_PROVIDER:-fallback}
      SUMMARY_MODEL_NAME: ${SUMMARY_MODEL_NAME:-gemini-2.5-flash}
      SUMMARY_MAX_DECISIONS: ${SUMMARY_MAX_DECISIONS:-5}
      SUMMARY_MAX_PASSAGE_CHARS: ${SUMMARY_MAX_PASSAGE_CHARS:-900}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      BACKEND_CORS_ALLOW_ORIGINS: ${BACKEND_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BACKEND_CORS_ALLOW_CREDENTIALS: ${BACKEND_CORS_ALLOW_CREDENTIALS:-false}
      HF_HOME: /app/.cache/huggingface
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SEARCH_API_BASE_URL: ${NEXT_PUBLIC_SEARCH_API_BASE_URL:-http://localhost:8000}
    container_name: ragitay-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SEARCH_API_BASE_URL: ${NEXT_PUBLIC_SEARCH_API_BASE_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
  huggingface_cache:
