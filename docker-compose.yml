services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragitay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragitay}
      POSTGRES_USER: ${POSTGRES_USER:-ragitay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragitay}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
